name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v3

      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Kareena-Treesa-Thomas
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=ffffff&color_dots=#0d1117,#6c3483,#1a6baf,#e91e8c,#ff6f00
            dist/github-contribution-grid-snake-dark.svg?color_snake=ffffff&color_dots=#0d1117,#6c3483,#1a6baf,#e91e8c,#ff6f00

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
